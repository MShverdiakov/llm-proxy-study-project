global
    daemon
    maxconn 256

defaults
    mode http
    timeout connect 5s
    timeout client 50s
    timeout server 50s
    option httplog

frontend stats
    bind *:8404
    stats enable
    stats uri /stats
    stats refresh 10s
    stats admin if TRUE

frontend llm_front
    bind *:8080
    default_backend llm_backends

backend llm_backends
    option httpchk GET /health
    http-check expect status 200
    server llm1 llm-proxy-1:8000 check inter 5s fall 3 rise 2
    server llm2 llm-proxy-2:8000 check inter 5s fall 3 rise 2 backup
