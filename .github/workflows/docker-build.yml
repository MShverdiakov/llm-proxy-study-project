name: Docker Build & Push

on:
  push:
    branches: [main]

jobs:
  docker:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        include:
          - service: llm-proxy
            dockerfile: deployments/llm-proxy/Dockerfile
            image: ghcr.io/${{ github.repository }}/llm-proxy
          - service: auth-service
            dockerfile: deployments/auth-service/Dockerfile
            image: ghcr.io/${{ github.repository }}/auth-service
          - service: billing-service
            dockerfile: deployments/billing-service/Dockerfile
            image: ghcr.io/${{ github.repository }}/billing-service

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push ${{ matrix.service }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ${{ matrix.image }}:latest
            ${{ matrix.image }}:${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}
